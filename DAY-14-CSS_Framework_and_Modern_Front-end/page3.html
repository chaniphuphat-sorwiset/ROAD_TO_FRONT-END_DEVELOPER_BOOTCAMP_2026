      .header {

        color: white;

      }

      .product img {

        height: auto;
      }

      }
      .product p {
        margin-bottom: 10px;
      }
      .footer {
        margin-top: 20px;
        background-color: #333;
        padding: 20px;
        color: white;
        text-align: center;
      }
      @media (min-width: 600px) {
        .product {
          flex: 50%;
        }
      }
      @media (min-width: 960px) {
        .product {

        }
      }
